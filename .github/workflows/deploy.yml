name: Deploy Application

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  NODE_VERSION: '20.x'
  AZURE_RESOURCE_GROUP: rg-recipe-app-prod

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  get-resources:
    runs-on: ubuntu-latest
    outputs:
      container-app-name: ${{ steps.get-names.outputs.container-app-name }}
      frontend-container-app-name: ${{ steps.get-names.outputs.frontend-container-app-name }}
      backend-url: ${{ steps.get-names.outputs.backend-url }}
    
    steps:
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Get resource names
      id: get-names
      run: |
        CONTAINER_APP_NAME=$(az containerapp list \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --query "[?contains(name, 'recipe-api')].name | [0]" -o tsv)
        FRONTEND_APP_NAME=$(az containerapp list \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --query "[?contains(name, 'recipe-web')].name | [0]" -o tsv)
        BACKEND_FQDN=$(az containerapp show \
          --name "$CONTAINER_APP_NAME" \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || echo "")
        echo "container-app-name=$CONTAINER_APP_NAME" >> $GITHUB_OUTPUT
        echo "frontend-container-app-name=$FRONTEND_APP_NAME" >> $GITHUB_OUTPUT
        echo "backend-url=https://${BACKEND_FQDN}" >> $GITHUB_OUTPUT

  build-and-push-image:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}/recipe-api
        tags: |
          type=sha,prefix={{branch}}-
          type=ref,event=branch
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend/RecipeApi
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  build-and-push-frontend-image:
    runs-on: ubuntu-latest
    needs: get-resources
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}/recipe-frontend
        tags: |
          type=sha,prefix={{branch}}-
          type=ref,event=branch
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          NEXT_PUBLIC_API_BASE_URL=${{ needs.get-resources.outputs.backend-url }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [get-resources, build-and-push-image]
    
    steps:
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Update Container App
      run: |
        # Extract first tag from the list
        IMAGE_TAG=$(echo "${{ needs.build-and-push-image.outputs.image-tag }}" | head -n1)
        
        az containerapp update \
          --name ${{ needs.get-resources.outputs.container-app-name }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --image "$IMAGE_TAG"
    
    - name: Display backend URL
      run: |
        URL=$(az containerapp show \
          --name ${{ needs.get-resources.outputs.container-app-name }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --query "properties.configuration.ingress.fqdn" -o tsv)
        echo "✅ Backend deployed to: https://$URL"

  migrate-database:
    runs-on: ubuntu-latest
    needs: deploy-backend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore NuGet packages
      run: |
        dotnet restore ./backend/RecipeApi/RecipeApi.csproj

    - name: Install EF Core tools
      run: dotnet tool install --global dotnet-ef
    
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Run EF Migrations
      run: |
        dotnet ef database update \
          --project ./backend/RecipeApi/RecipeApi.csproj \
          --connection "${{ secrets.AZURE_SQL_CONNECTION_STRING }}"
      env:
        ASPNETCORE_ENVIRONMENT: Production

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [get-resources, build-and-push-frontend-image, migrate-database]
    
    steps:
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Update Frontend Container App
      run: |
        IMAGE_TAG=$(echo "${{ needs.build-and-push-frontend-image.outputs.image-tag }}" | head -n1)
        
        az containerapp update \
          --name ${{ needs.get-resources.outputs.frontend-container-app-name }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --image "$IMAGE_TAG"
    
    - name: Display frontend URL
      id: frontend-url
      run: |
        URL=$(az containerapp show \
          --name ${{ needs.get-resources.outputs.frontend-container-app-name }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --query "properties.configuration.ingress.fqdn" -o tsv)
        echo "url=https://$URL" >> $GITHUB_OUTPUT
        echo "✅ Frontend deployed to: https://$URL"
    
    - name: Set NEXTAUTH_URL on frontend
      # NEXTAUTH_URL must equal the app's own public URL so Google OAuth redirect URIs resolve correctly.
      # This is a runtime env var (not baked into the image), so we set it after the URL is known.
      run: |
        FRONTEND_URL="${{ steps.frontend-url.outputs.url }}"
        az containerapp update \
          --name ${{ needs.get-resources.outputs.frontend-container-app-name }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --set-env-vars "NEXTAUTH_URL=${FRONTEND_URL}"
        echo "🔑 NEXTAUTH_URL set to: ${FRONTEND_URL}"
    
    outputs:
      frontend-url: ${{ steps.frontend-url.outputs.url }}

  update-backend-cors:
    runs-on: ubuntu-latest
    needs: [get-resources, deploy-frontend]
    
    steps:
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Update Backend CORS Configuration
      run: |
        echo "🔧 Updating backend CORS to allow: ${{ needs.deploy-frontend.outputs.frontend-url }}"
        
        az containerapp update \
          --name ${{ needs.get-resources.outputs.container-app-name }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --set-env-vars "Cors__AllowedOrigins__0=${{ needs.deploy-frontend.outputs.frontend-url }}"
        
        echo "✅ CORS configuration updated successfully!"
